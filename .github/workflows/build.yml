name: 编译 CarPlayVideoEnabler

on:
  push:
    branches: [main, master]
    paths:
      - 'CarPlayVideoEnabler/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:
  release:
    types: [published]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: 编译 dylib
        working-directory: CarPlayVideoEnabler
        run: |
          SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
          echo "SDK: $SDK_PATH"

          mkdir -p build

          clang -arch arm64 \
            -isysroot "$SDK_PATH" \
            -miphoneos-version-min=14.0 \
            -dynamiclib \
            -fobjc-arc \
            -framework Foundation \
            -framework UIKit \
            -framework CoreLocation \
            -o build/CPVE.dylib \
            CarPlayVideoEnabler_standalone.m

          echo "=== 检查产物 ==="
          ls -lh build/CPVE.dylib
          file build/CPVE.dylib

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: CarPlayVideoEnabler
          path: CarPlayVideoEnabler/build/CPVE.dylib

      - name: 上传到 Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: CarPlayVideoEnabler/build/CPVE.dylib
